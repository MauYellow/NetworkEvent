<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Event Network{% endblock %}</title>
    <link rel="icon" href="/assets/img/logo.jpg">
    {% block head %}{% endblock %}
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Segoe UI', Arial, sans-serif; }

        .layout { display: flex; height: 100vh; }

        .sidebar {
            width: 220px;
            background: #1a2b1a;
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-logo {
            padding: 16px 20px;
            font-size: 13px;
            font-weight: 700;
            border-bottom: 1px solid #253525;
            letter-spacing: 0.3px;
            color: #fff;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-logo img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
        }

        .sidebar-nav { padding-top: 8px; }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 12px 20px;
            color: #7a9a7a;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .sidebar-nav a:hover { background: #243524; color: #c8e6c8; }
        .sidebar-nav a.active { background: #253525; color: #fff; border-left-color: #4A7C59; }
        .sidebar-nav svg { width: 18px; height: 18px; flex-shrink: 0; }

        .content {
            flex: 1;
            overflow: auto;
            position: relative;
            background: #F5F0E8;
        }
        .content.map-mode { overflow: hidden; }

        /* Sidebar user footer */
        .sidebar-footer {
            margin-top: auto;
            padding: 14px 16px;
            border-top: 1px solid #253525;
        }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #4A7C59;
            color: white;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .sidebar-user-info { min-width: 0; }
        .sidebar-user-name {
            font-size: 13px;
            color: #ddd;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-logout {
            font-size: 11px;
            color: #6a8a6a;
            text-decoration: none;
            transition: color 0.15s;
        }
        .sidebar-logout:hover { color: #e74c3c; }
        .sidebar-signin {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            background: #1e311e;
            border: 1px solid #2e4a2e;
            border-radius: 8px;
            color: #7a9a7a;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.15s, color 0.15s;
            width: 100%;
        }
        .sidebar-signin:hover { background: #253525; color: #c8e6c8; }
    </style>
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/img/logo.jpg" alt="Sport Events Network">
            Sport Events Network
        </div>
        <div class="sidebar-nav">
            <a href="/" {% if active_page == 'map' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                    <circle cx="12" cy="9" r="2.5"/>
                </svg>
                Map
            </a>
            <a href="/events" {% if active_page == 'events' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                Events
            </a>
            <a href="/profile" {% if active_page == 'profile' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                Profile
            </a>
        </div>
        <div class="sidebar-footer">
            {% if session.get('user_name') %}
            <div class="sidebar-user">
                <div class="sidebar-avatar">{{ session.user_name[0] | upper }}</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name">{{ session.user_name }}</div>
                    <a href="/logout" class="sidebar-logout">Sign out</a>
                </div>
            </div>
            {% else %}
            <a href="/login" class="sidebar-signin">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Sign in
            </a>
            {% endif %}
        </div>
    </nav>
    <div class="content {% block content_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </div>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
