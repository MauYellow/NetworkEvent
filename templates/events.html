{% extends "base.html" %}

{% block title %}Events – Event Network{% endblock %}

{% block head %}
<style>
    .page-header {
        background: white;
        padding: 18px 28px;
        border-bottom: 1px solid #DDD5C8;
        display: flex;
        align-items: center;
        gap: 14px;
    }
    .page-header h1 { font-size: 20px; font-weight: 700; color: #1a2410; }
    .page-header .count {
        font-size: 12px;
        color: #fff;
        background: #4A7C59;
        padding: 2px 9px;
        border-radius: 20px;
        font-weight: 600;
    }

    .events-toolbar {
        padding: 10px 28px;
        background: white;
        border-bottom: 1px solid #DDD5C8;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }
    .toolbar-label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-select {
        padding: 6px 10px;
        font-size: 12px;
        border: 1px solid #DDD5C8;
        border-radius: 6px;
        background: white;
        color: #333;
        outline: none;
        cursor: pointer;
    }
    .filter-select:focus { border-color: #4A7C59; }

    .search-input {
        padding: 6px 10px;
        font-size: 12px;
        border: 1px solid #DDD5C8;
        border-radius: 6px;
        background: white;
        color: #333;
        outline: none;
        width: 200px;
    }
    .search-input:focus { border-color: #4A7C59; }

    /* Table container */
    .table-wrap {
        overflow-x: auto;
        height: calc(100vh - 115px);
        overflow-y: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        background: white;
    }

    thead th {
        position: sticky;
        top: 0;
        background: #F5F0E8;
        color: #555;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        padding: 10px 16px;
        border-bottom: 2px solid #DDD5C8;
        border-right: 1px solid #EDE8E0;
        white-space: nowrap;
        text-align: left;
        user-select: none;
        cursor: pointer;
        z-index: 10;
    }
    thead th:last-child { border-right: none; }
    thead th:hover { background: #EDE8E0; }
    thead th.sort-asc::after  { content: ' ↑'; color: #4A7C59; }
    thead th.sort-desc::after { content: ' ↓'; color: #4A7C59; }

    tbody tr {
        border-bottom: 1px solid #EDE8E0;
        transition: background 0.1s;
    }
    tbody tr:hover { background: #FDFAF6; }

    td {
        padding: 10px 16px;
        color: #333;
        border-right: 1px solid #EDE8E0;
        vertical-align: middle;
        white-space: nowrap;
    }
    td:last-child { border-right: none; }

    /* Row number */
    .td-num {
        color: #bbb;
        font-size: 11px;
        text-align: right;
        min-width: 36px;
        padding-right: 10px;
        user-select: none;
    }

    /* Event name */
    .td-name {
        font-weight: 600;
        color: #1a2410;
        min-width: 200px;
        white-space: normal;
    }

    /* Type badge */
    .badge {
        display: inline-block;
        padding: 2px 9px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        white-space: nowrap;
    }
    .badge-sport    { background: #E8F0E8; color: #3D5A3E; }
    .badge-cultural { background: #EEF0F8; color: #3D4A7C; }
    .badge-default  { background: #F0EDE8; color: #7C6A3D; }

    /* Date cell */
    .td-date { color: #555; font-size: 12px; min-width: 100px; }
    .date-overdue { color: #e74c3c; }
    .date-soon    { color: #f59e0b; font-weight: 600; }
    .date-future  { color: #27ae60; }

    /* Days pill */
    .days-pill {
        display: inline-block;
        background: #F5F0E8;
        border: 1px solid #DDD5C8;
        border-radius: 20px;
        padding: 1px 9px;
        font-size: 11px;
        color: #888;
        white-space: nowrap;
    }

    .loading, .empty, .error {
        text-align: center;
        padding: 60px 20px;
        color: #aaa;
        font-size: 14px;
    }
    .error { color: #e74c3c; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Events</h1>
    <span class="count" id="eventsCount">–</span>
</div>

<div class="events-toolbar">
    <span class="toolbar-label">Filter</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Search event name…" oninput="applyFilters()" />
    <select class="filter-select" id="filterContinent" onchange="applyFilters()">
        <option value="">All continents</option>
    </select>
    <select class="filter-select" id="filterType" onchange="applyFilters()">
        <option value="">All types</option>
    </select>
</div>

<div class="table-wrap">
    <table id="eventsTable">
        <thead>
            <tr>
                <th class="td-num" style="cursor:default">#</th>
                <th onclick="sortBy('Event_name')">Event name</th>
                <th onclick="sortBy('Event_type')">Type</th>
                <th onclick="sortBy('Event_city')">City</th>
                <th onclick="sortBy('Event_region')">Region</th>
                <th onclick="sortBy('Event_continent')">Continent</th>
                <th onclick="sortBy('Event_starting_date')">Start date</th>
                <th onclick="sortBy('Event_ending_date')">End date</th>
                <th onclick="sortBy('Event_days')">Days</th>
            </tr>
        </thead>
        <tbody id="eventsBody">
            <tr><td colspan="9" class="loading">Loading events…</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
    let allEvents  = [];
    let sortField  = 'Event_starting_date';
    let sortDir    = 1; // 1 = asc, -1 = desc

    function esc(val) {
        if (val === null || val === undefined) return '';
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(Array.isArray(val) ? val.join(', ') : String(val)));
        return d.innerHTML;
    }

    function formatDate(raw) {
        if (!raw) return '';
        const d = new Date(raw);
        if (isNaN(d)) return esc(raw);
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function dateClass(raw) {
        if (!raw) return '';
        const d   = new Date(raw);
        const now = new Date();
        const diff = (d - now) / (1000 * 60 * 60 * 24);
        if (diff < 0)   return 'date-overdue';
        if (diff <= 30) return 'date-soon';
        return 'date-future';
    }

    function badgeClass(type) {
        if (!type) return '';
        const t = type.toLowerCase();
        if (t.includes('sport') || t.includes('football') || t.includes('olympic')) return 'badge-sport';
        if (t.includes('cultur') || t.includes('music') || t.includes('art')) return 'badge-cultural';
        return 'badge-default';
    }

    function renderRow(fields, index) {
        const name      = fields.Event_name      || '—';
        const type      = fields.Event_type      || '';
        const city      = fields.Event_city      || '—';
        const region    = fields.Event_region    || '—';
        const continent = fields.Event_continent || '—';
        const start     = fields.Event_starting_date || '';
        const end       = fields.Event_ending_date   || '';
        const days      = fields.Event_days;

        return `<tr>
            <td class="td-num">${index + 1}</td>
            <td class="td-name">${esc(name)}</td>
            <td>${type ? `<span class="badge ${badgeClass(type)}">${esc(type)}</span>` : '—'}</td>
            <td>${esc(city)}</td>
            <td>${esc(region)}</td>
            <td>${esc(continent)}</td>
            <td class="td-date ${dateClass(start)}">${formatDate(start) || '—'}</td>
            <td class="td-date ${dateClass(end)}">${formatDate(end) || '—'}</td>
            <td>${days != null ? `<span class="days-pill">${esc(days)} d</span>` : '—'}</td>
        </tr>`;
    }

    function populateFilters(events) {
        const continents = [...new Set(events.map(e => e.fields.Event_continent).filter(Boolean))].sort();
        const types      = [...new Set(events.map(e => e.fields.Event_type).filter(Boolean))].sort();

        const fc = document.getElementById('filterContinent');
        continents.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; fc.appendChild(o); });

        const ft = document.getElementById('filterType');
        types.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; ft.appendChild(o); });
    }

    function applyFilters() {
        const search    = document.getElementById('searchInput').value.toLowerCase();
        const continent = document.getElementById('filterContinent').value;
        const type      = document.getElementById('filterType').value;

        let filtered = allEvents.filter(({ fields }) => {
            if (continent && fields.Event_continent !== continent) return false;
            if (type      && fields.Event_type      !== type)      return false;
            if (search    && !(fields.Event_name || '').toLowerCase().includes(search)) return false;
            return true;
        });

        filtered = [...filtered].sort((a, b) => {
            const va = a.fields[sortField] ?? '';
            const vb = b.fields[sortField] ?? '';
            if (va < vb) return -1 * sortDir;
            if (va > vb) return  1 * sortDir;
            return 0;
        });

        renderTable(filtered);
    }

    function sortBy(field) {
        if (sortField === field) {
            sortDir *= -1;
        } else {
            sortField = field;
            sortDir   = 1;
        }
        // Update header classes
        document.querySelectorAll('thead th').forEach(th => {
            th.classList.remove('sort-asc', 'sort-desc');
        });
        const headers = ['', 'Event_name', 'Event_type', 'Event_city', 'Event_region', 'Event_continent', 'Event_starting_date', 'Event_ending_date', 'Event_days'];
        const idx = headers.indexOf(field);
        if (idx >= 0) {
            const th = document.querySelectorAll('thead th')[idx];
            th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
        }
        applyFilters();
    }

    function renderTable(events) {
        const body    = document.getElementById('eventsBody');
        const countEl = document.getElementById('eventsCount');
        countEl.textContent = events.length;

        if (!events.length) {
            body.innerHTML = '<tr><td colspan="9" class="empty">No events match the selected filters.</td></tr>';
            return;
        }
        body.innerHTML = events.map(({ fields }, i) => renderRow(fields, i)).join('');
    }

    async function loadEvents() {
        const body = document.getElementById('eventsBody');
        try {
            const res = await fetch('/api/events');
            if (res.status === 401) { window.location.href = '/login'; return; }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            allEvents = await res.json();

            if (!allEvents.length) {
                body.innerHTML = '<tr><td colspan="9" class="empty">No events found.</td></tr>';
                return;
            }

            populateFilters(allEvents);
            // Default sort: start date asc (already sorted by API)
            const startTh = document.querySelectorAll('thead th')[6];
            if (startTh) startTh.classList.add('sort-asc');
            renderTable(allEvents);
        } catch (err) {
            body.innerHTML = `<tr><td colspan="9" class="error">Error loading events: ${esc(err.message)}</td></tr>`;
        }
    }

    loadEvents();
</script>
{% endblock %}
