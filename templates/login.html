<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in – Event Network</title>
    <link rel="icon" href="/assets/img/logo.jpg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #F5F0E8;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: #fff;
            border: 1px solid #DDD5C8;
            border-radius: 18px;
            padding: 44px 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 40px rgba(26,43,26,0.10);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo img {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 14px;
            object-fit: cover;
        }
        .login-logo h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1a2410;
            letter-spacing: 0.2px;
        }
        .login-logo p { font-size: 13px; color: #888; margin-top: 5px; }

        .form-row { margin-bottom: 20px; }
        .form-row label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 7px;
        }
        .form-row input {
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            background: #FDFAF6;
            border: 1px solid #DDD5C8;
            border-radius: 9px;
            color: #333;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-row input::placeholder { color: #bbb; }
        .form-row input:focus {
            border-color: #4A7C59;
            box-shadow: 0 0 0 3px rgba(74,124,89,0.12);
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 26px;
        }
        .remember-row input[type="checkbox"] {
            width: 15px; height: 15px;
            accent-color: #4A7C59;
            cursor: pointer;
            flex-shrink: 0;
        }
        .remember-row label {
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #3D5A3E;
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-login:hover  { background: #2d4a2e; }
        .btn-login:active { transform: scale(0.99); }

        .error-box {
            background: rgba(239,68,68,0.07);
            border: 1px solid rgba(239,68,68,0.22);
            border-radius: 9px;
            padding: 11px 15px;
            font-size: 13px;
            color: #c0392b;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-divider {
            border: none;
            border-top: 1px solid #DDD5C8;
            margin: 28px 0 20px;
        }

        .login-footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }
        .login-footer a { color: #4A7C59; text-decoration: none; font-weight: 600; }
        .login-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <img src="/assets/img/logo.jpg" alt="Sport Events Network">
        <h1>Sport Events Network</h1>
        <p>Sign in to access the platform</p>
    </div>

    {% if error %}
    <div class="error-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="form-row">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="mario@example.com"
                   required autofocus autocomplete="email" />
        </div>
        <div class="form-row">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••"
                   required autocomplete="current-password" />
        </div>
        <div class="remember-row">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">Keep me signed in for 30 days</label>
        </div>
        <button type="submit" class="btn-login">Sign in</button>
    </form>

    <hr class="login-divider" />

    <div class="login-footer">
        No account yet? <a href="/register">Create your account</a>
    </div>
</div>
</body>
</html>
